name: Frontends

on:
  push:
    paths:
      - ".github/workflows/frontends.yml"
      - "services/frontend-a/**"
      - "services/frontend-b/**"
      - "services/frontend-c/**"
  pull_request:
    paths:
      - ".github/workflows/frontends.yml"
      - "services/frontend-a/**"
      - "services/frontend-b/**"
      - "services/frontend-c/**"

jobs:
  microfrontend-b:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend-b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend-b/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build-storybook
      - name: Tests and coverage (≥80%)
        run: npm run test:coverage

  microfrontend-c:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend-c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend-c/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run build-storybook
      - name: Tests and coverage (≥80%)
        run: npm run test:coverage

  admin-shell:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend-a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/frontend-a/package-lock.json
      - name: Build microfrontend packages
        run: |
          cd ../frontend-b && npm ci && npm run build
          cd ../frontend-c && npm ci && npm run build
      - run: npm ci
      - run: npm run lint
      - name: Typecheck and production build
        run: npm run build
      - name: Tests and coverage (≥80%)
        run: npm run test:coverage
