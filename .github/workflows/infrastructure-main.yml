# On merge to main/master: simulate a “master” deploy on the runner (Docker only).

name: Infrastructure (main — master)

on:
  push:
    branches: [main, master]
    paths:
      - ".github/workflows/infrastructure-main.yml"
      - ".github/workflows/infrastructure-simulate-deploy.yml"
      - "infrastructure/**"
      - "docker-compose*.yml"
      - "Makefile"
      - ".env.example"

jobs:
  simulate-master:
    uses: ./.github/workflows/infrastructure-simulate-deploy.yml
    secrets: inherit
    with:
      environment_name: master

  register-simulated-deployment:
    name: Register simulated-master deployment
    needs: simulate-master
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    environment: simulated-master
    steps:
      - name: Record simulated deploy
        run: echo "IaC simulation (Terraform, Puppet, Ansible) completed on main."
