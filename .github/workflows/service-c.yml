name: Service C

on:
  push:
    paths:
      - ".github/workflows/service-c.yml"
      - "services/service-c/**"
  pull_request:
    paths:
      - ".github/workflows/service-c.yml"
      - "services/service-c/**"

defaults:
  run:
    working-directory: services/service-c

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/service-c/pyproject.toml

      - name: Install dev dependencies
        run: pip install ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Pytest and coverage (≥90%)
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml -q
