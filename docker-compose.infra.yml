# Shared infrastructure: MongoDB, PostgreSQL, Kafka, Zookeeper, Kafka UI.
# Containers reach each other by name on app-network.
#
# Default Mongo/Postgres images use AWS ECR Public copies of Docker Official Images
# to avoid Docker Hub anonymous rate limits (toomanyrequests). Override with
# MONGO_IMAGE / POSTGRES_IMAGE in .env if you prefer docker.io.

services:
  mongodb:
    image: ${MONGO_IMAGE:-public.ecr.aws/docker/library/mongo:7}
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-service_a}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: ${POSTGRES_IMAGE:-public.ecr.aws/docker/library/postgres:16-alpine}
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-users}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-users}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: public.ecr.aws/bitnami/zookeeper:3.9
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    networks:
      - app-network

  kafka:
    image: public.ecr.aws/bitnami/kafka:3.6
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: CLIENT://:9092,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: CLIENT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: CLIENT
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/bitnami/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 50s

  kafka-init:
    image: public.ecr.aws/bitnami/kafka:3.6
    container_name: kafka-init
    restart: "no"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -eo pipefail
        # Topics match service-b bootstrap (KAFKA_USER_EVENTS_TOPIC / KAFKA_ROLE_EVENTS_TOPIC); $$ escapes $ for Compose.
        UT="$${KAFKA_USER_EVENTS_TOPIC:-user.events}"
        RT="$${KAFKA_ROLE_EVENTS_TOPIC:-role.events}"
        for T in "$$UT" "$$RT"; do
          echo "kafka-init: ensuring topic exists: $$T"
          /opt/bitnami/kafka/bin/kafka-topics.sh --create --if-not-exists \
            --bootstrap-server kafka:9092 \
            --topic "$$T" \
            --partitions 1 --replication-factor 1
        done
    environment:
      KAFKA_USER_EVENTS_TOPIC: ${KAFKA_USER_EVENTS_TOPIC:-user.events}
      KAFKA_ROLE_EVENTS_TOPIC: ${KAFKA_ROLE_EVENTS_TOPIC:-role.events}
    networks:
      - app-network

  kafka-ui:
    image: ${KAFKA_UI_IMAGE:-provectuslabs/kafka-ui:v0.7.2}
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    networks:
      - app-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  app-network:
    name: app-network
    driver: bridge
