syntax = "proto3";

package role.v1;

option go_package = "easy-devops-tutorial/service-b/internal/genpb/role/v1;rolev1";

message Role {
  string id = 1;
  string name = 2;
}

message CreateRoleRequest {
  string name = 1;
}

message GetRoleRequest {
  string id = 1;
}

message UpdateRoleRequest {
  string id = 1;
  string name = 2;
}

message DeleteRoleRequest {
  string id = 1;
}

message ListRolesRequest {}

message ListRolesResponse {
  repeated Role roles = 1;
}

message AssignUserRoleRequest {
  string user_id = 1;
  string role_id = 2;
}

message AssignUserRoleResponse {}

message RemoveUserRoleRequest {
  string user_id = 1;
  string role_id = 2;
}

message RemoveUserRoleResponse {}

service RoleService {
  rpc CreateRole(CreateRoleRequest) returns (Role);
  rpc GetRole(GetRoleRequest) returns (Role);
  rpc UpdateRole(UpdateRoleRequest) returns (Role);
  rpc DeleteRole(DeleteRoleRequest) returns (Role);
  rpc ListRoles(ListRolesRequest) returns (ListRolesResponse);
  rpc AssignUserRole(AssignUserRoleRequest) returns (AssignUserRoleResponse);
  rpc RemoveUserRole(RemoveUserRoleRequest) returns (RemoveUserRoleResponse);
}
