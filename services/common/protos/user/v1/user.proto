syntax = "proto3";

package user.v1;

option go_package = "easy-devops-tutorial/service-b/internal/genpb/user/v1;userv1";

message User {
  string id = 1;
  string username = 2;
  string email = 3;
  repeated string roles = 4;
}

message GetUserRequest {
  string id = 1;
}

message CreateUserRequest {
  string username = 1;
  string email = 2;
  optional string password = 3;
}

message ListUsersRequest {
  // Substring match on username or email (case-insensitive). Empty = no filter.
  optional string query = 1;
  // Filter users that have this role name (e.g. "admin"). Empty = no filter.
  optional string role = 2;
}

message ListUsersResponse {
  repeated User users = 1;
}

message UpdateUserRequest {
  string id = 1;
  optional string username = 2;
  optional string email = 3;
  optional string password = 4;
}

message DeleteUserRequest {
  string id = 1;
}

service UserService {
  rpc GetUser(GetUserRequest) returns (User);
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (User);
}
